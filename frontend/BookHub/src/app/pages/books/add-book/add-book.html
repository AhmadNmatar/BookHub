<div class="container mt-4">

  <div class="card shadow p-4">

    <h2 class="mb-4">
      <i class="fa-solid fa-plus"></i>
      Lägg till bok
    </h2>

    <form (ngSubmit)="addBook()">

      <!-- Title -->
      <div class="mb-3">
        <label class="form-label">Titel</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="book.title"
          name="title"
          required>
      </div>

      <!-- Author -->
      <div class="mb-3">
        <label class="form-label">Författare</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="book.author"
          name="author"
          required>
      </div>

      <!-- Published Date -->
      <div class="mb-3">
        <label class="form-label">Publiceringsår</label>

        <input
          type="year"
          class="form-control"
          [(ngModel)]="book.publishedYear"
          name="publishedDate"
          required>
      </div>

      <!-- Buttons -->
      <div class="d-flex gap-2">

        <button type="submit" class="btn btn-success">
          <i class="fa-solid fa-check"></i>
          Spara
        </button>

        <button
          type="button"
          class="btn btn-secondary"
          routerLink="/books">

          Tillbaka
        </button>

      </div>

    </form>

  </div>

</div>
