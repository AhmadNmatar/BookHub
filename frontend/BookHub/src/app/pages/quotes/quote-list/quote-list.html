<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>
      <i class="fa-solid fa-book"></i> Citat
    </h2>

    <button class="btn btn-success" routerLink="/quotes/add">
      <i class="fa-solid fa-plus"></i> Lägg till citat
    </button>
  </div>
    @for (quote of quoteList; track quote.id) {

<div class="card shadow-sm mb-3">

  <div class="card-body">

    <p class="card-text fs-5">
      <i class="fa-solid fa-quote-left me-2 text-secondary"></i>
      {{ quote.text }}
    </p>

    <h6 class="text-muted text-end mb-3">
      — {{ quote.author }}
    </h6>

    <div class="d-flex justify-content-end">

      <button
        class="btn btn-warning btn-sm me-2"
        [routerLink]="['/quotes/edit', quote.id]">

        <i class="fa-solid fa-pen"></i>
      </button>

      <button
        class="btn btn-danger btn-sm"
        (click)="deleteQuote(quote.id)">
        <i class="fa-solid fa-trash"></i>
      </button>

    </div>

  </div>

</div>

    }

</div>
